<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrakeAI</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{--bg:#f0f4f8;--bg2:#e8eef5;--panel:#ffffff;--panel2:#f5f8fc;--edge:rgba(30,100,200,.13);--text:#1a2540;--muted:#5a6e8a;--accent:#1a7fcc;--accent2:#2a5fcc;--ok:#1cb86b;--shadow:0 4px 24px rgba(30,80,160,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top right,rgba(180,210,245,.45),transparent 30%),radial-gradient(circle at bottom left,rgba(200,220,250,.35),transparent 25%),linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh}
    .app-shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
    .sidebar{padding:22px 18px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(240,246,255,.97));border-right:1px solid var(--edge);box-shadow:2px 0 12px rgba(30,80,160,.06)}
    .brand-box{padding:12px 8px 18px 8px;border-bottom:1px solid rgba(30,80,160,.10);margin-bottom:18px}.brand{font-size:2rem;font-weight:800;letter-spacing:.02em;color:#1a2540}.brand span{color:#1a7fcc}.brand-sub{font-size:1rem;color:var(--muted);margin-top:-4px}
    .menu-link{display:block;padding:15px 16px;border-radius:16px;color:var(--text);text-decoration:none;margin-bottom:10px;border:1px solid transparent;font-size:1.04rem}.menu-link:hover,.menu-link.active{background:linear-gradient(90deg,rgba(26,127,204,.12),rgba(42,95,204,.07));border-color:rgba(26,127,204,.22);color:#1a7fcc;font-weight:600}
    .sidebar-footer{margin-top:auto;padding-top:10px}.status-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(240,246,255,.95);border:1px solid rgba(26,127,204,.15);color:#2a5a8a}.dot{width:10px;height:10px;border-radius:50%;background:#1cb86b;box-shadow:0 0 8px rgba(28,184,107,.6)}
    .content{padding:18px 20px 24px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 18px;margin-bottom:22px;border-radius:18px;background:linear-gradient(90deg,rgba(255,255,255,.98),rgba(245,250,255,.96));border:1px solid var(--edge);box-shadow:0 2px 12px rgba(30,80,160,.07)}
    .eyebrow{font-size:.84rem;letter-spacing:.2em;text-transform:uppercase;color:#1a7fcc}.search-wrap{display:flex;align-items:center;gap:12px}.search-box{min-width:290px;background:#edf2fa;border:1px solid rgba(30,80,160,.12);border-radius:16px;padding:12px 16px;color:var(--text)}.search-box::placeholder{color:#7a92b0}.logout-btn{padding:12px 22px;border:none;border-radius:16px;background:linear-gradient(90deg,#1a7fcc,#2a5fcc);color:white;font-weight:600}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(248,252,255,.97));border:1px solid var(--edge);border-radius:24px;padding:22px;box-shadow:var(--shadow)} .glass{backdrop-filter:blur(14px)}
    .table-dark{--bs-table-bg:transparent;--bs-table-striped-bg:rgba(26,127,204,.04);--bs-table-hover-bg:rgba(26,127,204,.07);color:var(--text);background-color:transparent} .text-secondary{color:var(--muted)!important}
    .btn-primary{background:linear-gradient(90deg,#1a7fcc,#2a5fcc);border:none;color:#fff}.btn-outline-info{border-color:#1a7fcc;color:#1a7fcc}.form-control,.form-select{background:#fff;border:1px solid rgba(30,80,160,.18);color:#1a2540}.form-label{color:#2a4a6a}
    .hero-card{min-height:520px;display:flex;flex-direction:column;justify-content:flex-start}.tag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.tag-card{padding:14px 16px;border-radius:18px;background:rgba(240,246,255,.9);border:1px solid rgba(30,80,160,.10)}
    thead th{background:#edf3fb;color:#1a2540;border-color:rgba(30,80,160,.12)!important} tbody td{border-color:rgba(30,80,160,.07)!important;color:#1a2540}
    @media(max-width:992px){.app-shell{grid-template-columns:1fr}.sidebar{padding-bottom:8px}.topbar{flex-direction:column;align-items:flex-start}.search-wrap{width:100%}.search-box{min-width:unset;width:100%}}
  </style>
</head>
<body data-page="{{ request.endpoint or "" }}">
<div class="app-shell">
  <aside class="sidebar d-flex flex-column">
    <div class="brand-box">
      <div class="brand"><span>Drake</span>AI</div>
      <div class="brand-sub">Reservoir intelligence</div>
    </div>
    <a class="menu-link" href="{{ url_for('dashboard') }}">Dashboard</a>
    <a class="menu-link" href="{{ url_for('visualization_page') }}">AI Log Visualization</a>
    <a class="menu-link" href="{{ url_for('prediction_page') }}">AI Prediction</a>
    <a class="menu-link" href="{{ url_for('uncertainty_page') }}">AI Uncertainty</a>
    <div class="sidebar-footer mt-auto">
      <div class="status-pill"><span class="dot"></span> AI Ready</div>
    </div>
  </aside>
  <main class="content">
    <div class="topbar">
      <div>
        <div class="eyebrow">Industrial Geological Dashboard</div>
        <h2 class="mb-0">AI-powered LAS well log analysis</h2>
      </div>
      <div class="search-wrap">
        <input class="search-box" placeholder="Search wells, logs, intervals">
      </div>
    </div>
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
<script>
(function(){
  const endpoint = document.body.dataset.page || '';
  document.querySelectorAll('.menu-link').forEach(a=>{
    const href = a.getAttribute('href') || '';
    if ((endpoint==='dashboard' && href.endsWith('/dashboard')) ||
        (endpoint==='visualization_page' && href.endsWith('/visualization')) ||
        (endpoint==='prediction_page' && href.endsWith('/prediction')) ||
        (endpoint==='uncertainty_page' && href.endsWith('/uncertainty'))) {
      a.classList.add('active');
    }
  });
})();
</script>
</body>
</html>

version: "3.9"
# Use this for production deployment:
# docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: drakeai_postgres
    environment:
      POSTGRES_DB: drakeai
      POSTGRES_USER: drakeai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drakeai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drakeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drakeai_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: drakeai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-drakeai_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-drakeai_minio_secret}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drakeai_backend
    environment:
      DATABASE_URL: postgresql://drakeai:${POSTGRES_PASSWORD:-drakeai_secret}@postgres:5432/drakeai
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-drakeai_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-drakeai_minio_secret}
      MINIO_BUCKET: drakeai-files
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: '["http://localhost","http://localhost:80","https://yourdomain.com"]'
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             python -c 'from app.core.seed import seed_db; seed_db()' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: drakeai_frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: drakeai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  upload_data:

<!DOCTYPE html>
<html lang="en">
  <head><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <title>Import LAS Files - {{ well_name }}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/well_selections.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <style>
      /* Styles for the sidebar and logout button */
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 250px;
        background-color: #343a40;
        color: white;
        overflow-y: auto;
        padding-top: 20px;
      }

      #sidebar-header {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #555;
      }

      #sidebar-header h2 {
        margin: 0;
        font-size: 18px;
      }

      .menu-item {
        padding: 15px;
        border-bottom: 1px solid #555;
      }

      .menu-item a {
        text-decoration: none;
        color: white;
        display: block;
      }

      .menu-item a:hover {
        background-color: #495057;
      }

      /* Logout button styles */
      #logout-btn {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
      }

      #logout-btn a {
        text-decoration: none;
        color: white;
        font-weight: bold;
        padding: 10px;
        display: block;
        background-color: #dc3545;
        border-radius: 5px;
      }

      #logout-btn a:hover {
        background-color: #c82333;
      }

      /* Adjust content area to account for sidebar */
      #content {
        margin-left: 260px;
        padding: 20px;
      }

      h1 {
        font-size: 24px;
      }

      form {
        margin-top: 20px;
      }

      form input[type="file"] {
        margin-bottom: 10px;
      }

      form button {
        padding: 10px 20px;
        font-size: 16px;
      }

      a.back-link {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        color: #007bff;
      }

      a.back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <!-- <img
        src="{{ url_for('static', filename='drake.png') }}"
        alt="Drake Logo"
        style="
          background-color: white;
          width: 160px;
          height: auto;
          padding: 10px;
          border-radius: 5px;
        "
      /> -->
      <div id="sidebar-header">
        <h2>Project: {{ project_name }}</h2>
      </div>
      <div class="menu-item">
        <a href="{{ url_for('project_dashboard', project_name=project_name) }}"
          >Back to Project Dashboard</a
        >
      </div>
      <!-- Added Logout Button
      <div id="logout-btn">
        <a href="{{ url_for('logout') }}">Logout</a>
      </div> -->
    </div>

    <div id="content">
      <h1>Import LAS Files for {{ well_name }}</h1>

      <form
        action="{{ url_for('import_las_files', project_name=project_name, well_name=well_name) }}"
        method="post"
        enctype="multipart/form-data"
      >
        <input type="file" name="files[]" multiple accept=".las" />
        <button type="submit">Import LAS Files</button>
      </form>

      <a
        href="{{ url_for('project_dashboard', project_name=project_name) }}"
        class="back-link"
        >Back to Project Dashboard</a
      >
    </div>
  </body>
</html>
